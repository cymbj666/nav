<!DOCTYPE html>

  <!-- LXGW WenKai 霞鹜文楷 CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">

  <!-- 主样式 -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon 占位 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">

<body>
  <!-- 深色模式切换 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式" title="切换深色/亮色模式">🌙</button>

  <!-- 顶部区域 -->

    <!-- 搜索框 -->
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="搜索名称、描述或标签…"
        autocomplete="off"
      >
      <kbd class="search-hint" id="searchHint">Ctrl+K</kbd>
    </div>
  </header>

  <!-- 卡片容器（JS 动态渲染） -->
  <main id="cardsContainer" class="cards-container">
    <!-- 加载中占位 -->
    <div class="loading">加载中…</div>
  </main>

  <!-- 底部 -->
  <footer class="footer">
    <p>Made with ❤️ · 数据存于 <code>data/links.json</code></p>
  </footer>
