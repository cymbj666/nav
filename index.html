        <path d="m21 21-4.35-4.35"/>

        type="text"
        id="searchInput"
        class="search-input"

        autocomplete="off"
      >
      <kbd class="search-hint" id="searchHint">Ctrl+K</kbd>
    </div>
  </header>

  <main id="cardsContainer" class="cards-container">
